site_name: 타닥불 위키
site_url: https://the-campfire.github.io/
site_description: 타닥불 서버 위키 — 안내·규칙·기능·명령어
docs_dir: docs

theme:
  name: material
  language: ko
  font: false
  icon:
    logo: material/campfire
  palette:
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: 다크 모드로
  features:
    - navigation.top
    - navigation.sections
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - 홈: index.md
  - 처음 오신 분:
      - 시작하기: getting-started.md
      - 서버 규칙: rules.md
  - 서버 둘러보기:
      - 채널 안내: channels.md
      - 역할 안내: roles.md
  - 서버 기능:
      - 음성방 만들기: voice.md
      - 파티 모집: party.md
      - 음악 신청: music.md
      - 신고·문의: support.md
  - 화폐·경제:
      - 코인과 레벨: economy.md
      - 출석과 미션: attendance-missions.md
      - 상점과 꾸미기: shop.md
      - 랭킹: ranking.md
  - 명령어:
      - 기본 명령어: commands-basic.md
      - 화폐·상점 명령어: commands-economy.md
  - 자주 묻는 질문: faq.md
